name: AI Dev Agent

on:
  workflow_dispatch:
    inputs:
      agent:
        description: 'Which agent to run'
        required: true
        type: choice
        options:
          - senior
          - junior
      linear_issue:
        description: 'Linear issue key or id'
        required: true
        type: string
      branch:
        description: 'Branch name for the task'
        required: true
        type: string
      prompt:
        description: 'Codex prompt to execute'
        required: true
        type: string

jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      CODEX_QUIET_MODE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select token
        id: token
        run: |
          if [ "${{ inputs.agent }}" = "senior" ]; then
            echo "GH_TOKEN=${{ secrets.GH_PAT_SR }}" >> $GITHUB_ENV
            echo "AGENT_USER=gabrielmnzs-ai-team-sr" >> $GITHUB_ENV
          else
            echo "GH_TOKEN=${{ secrets.GH_PAT_JR }}" >> $GITHUB_ENV
            echo "AGENT_USER=gabrielmnzs-ai-team-jr" >> $GITHUB_ENV
          fi

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Verify GitHub CLI auth
        run: gh auth status

      - name: Run Codex agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_NAME: ${{ vars.LINEAR_TEAM_NAME }}
          LINEAR_PROJECT_NAME: ${{ vars.LINEAR_PROJECT_NAME }}
          DEVTEAM_UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO }}
          CI: true
        run: |
          OPENAI_API_KEY="$(printf '%s' "${OPENAI_API_KEY:-}" | tr -d '\r\n')"
          echo "Agent: ${AGENT_USER}"
          echo "Linear Issue: ${{ inputs.linear_issue }}"
          echo "Branch: ${{ inputs.branch }}"
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY is missing";
            exit 1;
          fi
          if [ "${OPENAI_API_KEY#sk-}" = "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY format looks invalid (expected prefix sk-).";
            exit 1;
          fi
          echo "::add-mask::${OPENAI_API_KEY}"
          set +e
          timeout 15m env OPENAI_API_KEY="${OPENAI_API_KEY}" npx @openai/codex@0.112.0 \
            -a never \
            --sandbox workspace-write \
            exec "${{ inputs.prompt }}"
          exit_code=$?
          set -e
          if [ $exit_code -eq 124 ]; then
            echo "Codex execution timed out"
            exit 1
          fi
          if [ $exit_code -ne 0 ]; then
            echo "Codex execution failed with exit code $exit_code"
            exit $exit_code
          fi
