name: AI Dev Agent

on:
  workflow_dispatch:
    inputs:
      agent:
        description: 'Which agent to run'
        required: true
        type: choice
        options:
          - senior
          - junior
      linear_issue:
        description: 'Linear issue key or id'
        required: true
        type: string
      branch:
        description: 'Branch name for the task'
        required: true
        type: string
      prompt:
        description: 'Codex prompt to execute'
        required: true
        type: string

jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      CODEX_QUIET_MODE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select token
        id: token
        run: |
          if [ "${{ inputs.agent }}" = "senior" ]; then
            echo "GH_TOKEN=${{ secrets.GH_PAT_SR }}" >> $GITHUB_ENV
            echo "AGENT_USER=gabrielmnzs-ai-team-sr" >> $GITHUB_ENV
          else
            echo "GH_TOKEN=${{ secrets.GH_PAT_JR }}" >> $GITHUB_ENV
            echo "AGENT_USER=gabrielmnzs-ai-team-jr" >> $GITHUB_ENV
          fi

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Verify GitHub CLI auth
        run: gh auth status

      - name: Validate Codex inputs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          OPENAI_API_KEY="$(printf '%s' "${OPENAI_API_KEY:-}" | tr -d '\r\n')"
          echo "Agent: ${AGENT_USER}"
          echo "Linear Issue: ${{ inputs.linear_issue }}"
          echo "Branch: ${{ inputs.branch }}"
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY is missing"
            exit 1
          fi
          if [ "${OPENAI_API_KEY#sk-}" = "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY format looks invalid (expected prefix sk-)"
            exit 1
          fi

      - name: Run Codex agent
        id: run_codex
        uses: openai/codex-action@v1
        timeout-minutes: 15
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}
          AGENT_USER: ${{ env.AGENT_USER }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_NAME: ${{ vars.LINEAR_TEAM_NAME }}
          LINEAR_PROJECT_NAME: ${{ vars.LINEAR_PROJECT_NAME }}
          DEVTEAM_UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO }}
          CI: true
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '["-a", "never"]'
          prompt: ${{ inputs.prompt }}

      - name: Show Codex final message
        if: ${{ steps.run_codex.outputs.final-message != '' }}
        run: |
          echo "${{ steps.run_codex.outputs.final-message }}"
